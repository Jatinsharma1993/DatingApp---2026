<div class="card bg-base-300 w-1/2 mx-auto flex flex-col p-6 rounded-lg shadow-lg">
    <div class="care-title justify-center 3-xl text-primary">Sign Up</div>
    <div class="card-body w-full">
        <form #registerForm="ngForm" class="flex flex-col gap-4 w-full" (ngSubmit)="register()">
            <input class="input w-full" name="email" [(ngModel)]="creds.email" placeholder="Email">
            <input class="input w-full" name="username" [(ngModel)]="creds.username" placeholder="Username">
            <input type="password" class="input w-full" name="password" [(ngModel)]="creds.password"
                placeholder="Password">
            <div class="flex items-center justify-end gap-3">
                <button class="btn" type="button" (click)="cancel()">Cancel</button>
                <button class="btn btn-primary" type="submit">Register</button>
            </div>
        </form>
    </div>
</div>
